# The Meaningful Message — Railway Service Configuration
# Three services + shared Postgres + one Volume on the web service.
# The renderer runs IN-PROCESS inside the web service (see
# instrumentation.ts) because Railway's Volumes are 1:1 with a service.

# ─── Service 1: Web Dashboard + embedded renderer ─────────────
# Serves the Next.js dashboard AND polls video_renders to do the
# ffmpeg/ElevenLabs/slide work in the same Node process. Single
# Volume mount works because the renderer writes and the web stream
# both happen in this container.
[[services]]
name = "web"
[services.build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"
[services.deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
[[services.volumes]]
name = "renders"
mountPath = "/data"

# ─── Service 2: Channel Watcher (cron) ────────────────────────
[[services]]
name = "watcher"
[services.build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:workers"
[services.deploy]
startCommand = "npm run worker:watcher"
# Runs hourly. Use Railway's cron feature to invoke on schedule.
cronSchedule = "0 * * * *"
restartPolicyType = "never"

# ─── Service 3: Generation Worker (always-on) ─────────────────
[[services]]
name = "generator"
[services.build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:workers"
[services.deploy]
startCommand = "npm run worker:generator"
restartPolicyType = "always"
