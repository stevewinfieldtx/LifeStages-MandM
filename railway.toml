# The Meaningful Message — Railway Service Configuration
# One repo, four services, shared Postgres, shared Volume for rendered MP4s.

# ─── Service 1: Web Dashboard ─────────────────────────────────
[[services]]
name = "web"
[services.build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"
[services.deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
# Mount the shared renders volume here so /api/renders/[id]/video.mp4
# can stream files written by the renderer worker.
[[services.volumes]]
name = "renders"
mountPath = "/data"

# ─── Service 2: Channel Watcher (cron) ────────────────────────
[[services]]
name = "watcher"
[services.build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:workers"
[services.deploy]
startCommand = "npm run worker:watcher"
# Runs hourly. Use Railway's cron feature to invoke on schedule.
cronSchedule = "0 * * * *"
restartPolicyType = "never"

# ─── Service 3: Generation Worker (always-on) ─────────────────
[[services]]
name = "generator"
[services.build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:workers"
[services.deploy]
startCommand = "npm run worker:generator"
restartPolicyType = "always"

# ─── Service 4: Renderer Worker (always-on, ffmpeg) ───────────
# Picks pending video_renders rows, calls ElevenLabs for TTS, builds
# slides, stitches with ffmpeg, writes MP4 to /data/renders/{id}/.
[[services]]
name = "renderer"
[services.build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:workers"
[services.deploy]
startCommand = "npm run worker:renderer"
restartPolicyType = "always"
[[services.volumes]]
name = "renders"
mountPath = "/data"
